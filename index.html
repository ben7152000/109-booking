<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Form</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <style>
    *,
    *::before,
    *::after { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, "Noto Sans TC", "Noto Sans JP", "Noto Sans KR",
        sans-serif;
      background: #fff0d9;
      color: #202124;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .lang-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff0d9;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }
    .lang-bar__inner {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      max-width: 720px;
      margin: 0 auto;
    }
    .lang-btn {
      flex: 1 1 auto;
      min-width: 72px;
      padding: 8px 12px;
      font-size: 14px;
      background: #fff;
      color: #5f6368;
      border: 1px solid #dadce0;
      border-radius: 999px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .lang-btn:hover { background: #f8f0e1; }
    .lang-btn.is-active {
      background: #c57b1e;
      color: #fff;
      border-color: #c57b1e;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    .form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .block {
      background: #fff;
      border: 1px solid #e0c9a4;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }
    .form__header {
      border-top: 10px solid #c57b1e;
      padding-top: 24px;
    }
    .form__title {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 500;
      line-height: 1.3;
    }
    .form__desc {
      margin: 0 0 12px;
      font-size: 14px;
      color: #5f6368;
    }
    .form__required-note {
      margin: 0;
      font-size: 13px;
      color: #5f6368;
    }

    .block__label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 10px;
      color: #202124;
    }
    .block__hint {
      margin: -4px 0 10px;
      font-size: 13px;
      color: #5f6368;
    }
    .block__notice {
      margin: -4px 0 6px;
      font-size: 13px;
      color: #d93025;
      font-weight: 500;
    }
    .required {
      color: #d93025;
      margin-left: 4px;
    }

    .block__input {
      display: block;
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      color: #202124;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    .block__input:focus {
      border-color: #c57b1e;
      box-shadow: 0 0 0 3px rgba(197, 123, 30, 0.2);
    }
    .block__input.is-invalid {
      border-color: #d93025;
    }
    .block__input.is-invalid:focus {
      box-shadow: 0 0 0 3px rgba(217, 48, 37, 0.2);
    }
    .field-error {
      margin: 6px 0 0;
      font-size: 13px;
      color: #d93025;
      display: none;
    }
    .field-error.is-visible { display: block; }
    select.block__input {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%235f6368' d='M6 8 0 0h12z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: 36px;
    }
    .file-upload {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }
    .file-btn {
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      background: #fff;
      color: #c57b1e;
      border: 1px solid #c57b1e;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .file-btn:hover { background: #fff7ea; }
    .file-btn:focus-within { box-shadow: 0 0 0 3px rgba(197,123,30,.2); }
    .file-name {
      font-size: 14px;
      color: #5f6368;
      word-break: break-all;
      flex: 1 1 auto;
      min-width: 0;
    }
    .file-name.is-busy { color: #c57b1e; font-weight: 500; }

    .block__options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid #eadfcc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: background .15s, border-color .15s;
    }
    .option:hover { background: #fff7ea; }
    .option input[type="radio"] {
      accent-color: #c57b1e;
      width: 18px;
      height: 18px;
      margin: 0;
      flex-shrink: 0;
    }
    .option:has(input:checked) {
      background: #fff1dc;
      border-color: #c57b1e;
    }

    .terms-box {
      max-height: 260px;
      overflow-y: auto;
      padding: 14px 16px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background: #fafafa;
      font-size: 14px;
      line-height: 1.7;
      color: #3c4043;
      -webkit-overflow-scrolling: touch;
    }
    .terms-box h4 {
      margin: 14px 0 4px;
      font-size: 15px;
      font-weight: 600;
      color: #202124;
    }
    .terms-box h4:first-child { margin-top: 0; }
    .terms-box p { margin: 0 0 6px; }

    .agree-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      cursor: pointer;
      user-select: none;
    }
    .agree-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #c57b1e;
      flex-shrink: 0;
      cursor: pointer;
      margin: 0;
    }
    .agree-row span {
      font-size: 15px;
      font-weight: 500;
      color: #202124;
    }
    .agree-row .required { color: #d93025; margin-left: 2px; }

    .signature-wrap {
      border: 2px dashed #bdbdbd;
      border-radius: 8px;
      background: #f5f5f5;
      position: relative;
      height: 220px;
      touch-action: none;
      overflow: hidden;
    }
    .signature-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }
    .signature-clear {
      margin-top: 8px;
      padding: 0;
      background: none;
      border: none;
      color: #d93025;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      font-family: inherit;
      font-size: 15px;
    }
    .signature-clear:hover { opacity: 0.85; }

    .actions {
      display: flex;
      justify-content: flex-end;
      padding-bottom: 32px;
    }
    .submit-btn {
      width: 100%;
      padding: 14px 20px;
      background: #c57b1e;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s, transform .05s;
    }
    .submit-btn:hover { background: #a6661a; }
    .submit-btn:active { transform: translateY(1px); }
    .submit-btn:disabled {
      background: #c9b79a;
      cursor: not-allowed;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(32, 33, 36, 0.55);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }
    .overlay.is-active { display: flex; }
    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (min-width: 640px) {
      .page { padding: 24px; }
      .block { padding: 24px; }
      .form__title { font-size: 28px; }
      .block__options { gap: 12px; }
    }
  </style>
</head>
<body>
  <header class="lang-bar">
    <div class="lang-bar__inner">
      <button type="button" class="lang-btn" data-lang="en" data-i18n="langEn"></button>
      <button type="button" class="lang-btn" data-lang="zh" data-i18n="langZh"></button>
      <button type="button" class="lang-btn" data-lang="ja" data-i18n="langJa"></button>
      <button type="button" class="lang-btn" data-lang="ko" data-i18n="langKo"></button>
    </div>
  </header>

  <main class="page">
    <form id="booking-form" class="form" novalidate>
      <section class="form__header block">
        <h1 class="form__title" data-i18n="formTitle"></h1>
        <p class="form__desc" data-i18n="formDesc"></p>
        <p class="form__required-note">
          <span class="required">*</span>
          <span data-i18n="requiredNote"></span>
        </p>
      </section>

      <section class="block">
        <label class="block__label" for="email">
          <span data-i18n="email"></span><span class="required">*</span>
        </label>
        <input type="email" id="email" name="email" class="block__input" data-i18n-ph="emailPh" autocomplete="email" required />
        <p class="field-error" id="emailError" data-i18n="emailInvalid"></p>
      </section>

      <section class="block">
        <label class="block__label" for="checkInDate">
          <span data-i18n="checkInDate"></span><span class="required">*</span>
        </label>
        <input type="text" id="checkInDate" name="checkInDate" class="block__input" autocomplete="off" readonly required />
      </section>

      <section class="block">
        <label class="block__label" for="bookingName">
          <span data-i18n="bookingName"></span><span class="required">*</span>
        </label>
        <input type="text" id="bookingName" name="bookingName" class="block__input" data-i18n-ph="bookingNamePh" required />
      </section>

      <section class="block">
        <label class="block__label" for="phone">
          <span data-i18n="phone"></span><span class="required" data-required-for="phone">*</span>
        </label>
        <input type="tel" inputmode="numeric" pattern="[0-9+\-\s]*" id="phone" name="phone" class="block__input" data-i18n-ph="phonePh" required />
      </section>

      <section class="block">
        <label class="block__label" for="lineId">
          <span data-i18n="lineId"></span><span class="required">*</span>
        </label>
        <input type="text" id="lineId" name="lineId" class="block__input" data-i18n-ph="lineIdPh" required />
      </section>

      <section class="block">
        <div class="block__label">
          <span data-i18n="gender"></span>
        </div>
        <div class="block__options">
          <label class="option">
            <input type="radio" name="gender" value="male" />
            <span data-i18n="male"></span>
          </label>
          <label class="option">
            <input type="radio" name="gender" value="female" />
            <span data-i18n="female"></span>
          </label>
        </div>
      </section>

      <section class="block">
        <div class="block__label">
          <span data-i18n="source"></span>
        </div>
        <div class="block__options">
          <label class="option">
            <input type="radio" name="source" value="airbnb" />
            <span data-i18n="srcAirbnb"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="agoda" />
            <span data-i18n="srcAgoda"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="asiayo" />
            <span data-i18n="srcAsiaYo"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="booking" />
            <span data-i18n="srcBooking"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="ctrip" />
            <span data-i18n="srcCtrip"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="direct" />
            <span data-i18n="srcDirect"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="expedia" />
            <span data-i18n="srcExpedia"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="facebook" />
            <span data-i18n="srcFacebook"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="line" />
            <span data-i18n="srcLine"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="wechat" />
            <span data-i18n="srcWechat"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="eztravel" />
            <span data-i18n="srcEztravel"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="hostelworld" />
            <span data-i18n="srcHostelworld"></span>
          </label>
          <label class="option">
            <input type="radio" name="source" value="other" />
            <span data-i18n="srcOther"></span>
          </label>
        </div>
      </section>

      <section class="block">
        <label class="block__label" for="idFile">
          <span data-i18n="idFile"></span><span class="required">*</span>
        </label>
        <p class="block__notice" data-i18n="idFileNotice"></p>
        <p class="block__hint" data-i18n="idFileHint"></p>
        <div class="file-upload">
          <label for="idFile" class="file-btn">
            <span data-i18n="chooseFile"></span>
          </label>
          <span class="file-name" id="idFileName" data-i18n="noFileChosen"></span>
          <input type="file" id="idFile" name="idFile" class="file-input" accept="image/*,.pdf" required />
        </div>
      </section>

      <section class="block">
        <label class="block__label" for="nationality">
          <span data-i18n="nationality"></span>
        </label>
        <select id="nationality" name="nationality" class="block__input">
          <option value="" data-i18n="selectPlaceholder"></option>
          <option value="TWN" data-i18n="natTWN"></option>
          <option value="CHN" data-i18n="natCHN"></option>
          <option value="SGP" data-i18n="natSGP"></option>
          <option value="MYS" data-i18n="natMYS"></option>
          <option value="JPN" data-i18n="natJPN"></option>
          <option value="FRA" data-i18n="natFRA"></option>
          <option value="HKG" data-i18n="natHKG"></option>
          <option value="KOR" data-i18n="natKOR"></option>
          <option value="THA" data-i18n="natTHA"></option>
          <option value="USA" data-i18n="natUSA"></option>
          <option value="PHL" data-i18n="natPHL"></option>
          <option value="IDN" data-i18n="natIDN"></option>
          <option value="NLD" data-i18n="natNLD"></option>
          <option value="GBR" data-i18n="natGBR"></option>
          <option value="ESP" data-i18n="natESP"></option>
          <option value="MAC" data-i18n="natMAC"></option>
          <option value="ZAF" data-i18n="natZAF"></option>
          <option value="DEU" data-i18n="natDEU"></option>
          <option value="CAN" data-i18n="natCAN"></option>
          <option value="VNM" data-i18n="natVNM"></option>
          <option value="KHM" data-i18n="natKHM"></option>
          <option value="ITA" data-i18n="natITA"></option>
          <option value="PAN" data-i18n="natPAN"></option>
          <option value="IND" data-i18n="natIND"></option>
          <option value="POL" data-i18n="natPOL"></option>
          <option value="SWE" data-i18n="natSWE"></option>
          <option value="CZE" data-i18n="natCZE"></option>
          <option value="OTHER" data-i18n="nationalityOther"></option>
        </select>
      </section>

      <section class="block">
        <div class="block__label">
          <span data-i18n="termsTitle"></span>
        </div>
        <div class="terms-box" id="termsBox"></div>
        <label class="agree-row">
          <input type="checkbox" id="agreeTerms" name="agreeTerms" required />
          <span><span data-i18n="agreeTerms"></span><span class="required">*</span></span>
        </label>
      </section>

      <section class="block">
        <label class="block__label" for="signatureCanvas">
          <span data-i18n="signatureLabel"></span><span class="required">*</span>
        </label>
        <div class="signature-wrap">
          <canvas class="signature-canvas" id="signatureCanvas"></canvas>
        </div>
        <button type="button" class="signature-clear" id="signatureClear" data-i18n="signatureClear"></button>
      </section>

      <div class="actions">
        <button type="submit" class="submit-btn" data-i18n="submit"></button>
      </div>
    </form>
  </main>

  <div class="overlay" id="submitOverlay" aria-hidden="true">
    <div class="spinner"></div>
  </div>

  <script>
  (function () {
    // ============================================================
    //  設定區：部署 Apps Script 後把 URL 貼進來
    // ============================================================
    const ENDPOINT = "https://script.google.com/macros/s/AKfycby67VMQz38wy3nDnzMDquP-CvJaBnocM7w7VsU-HatkNIqf6XUBGQ-T8mKpP3K1cfJAzw/exec";

    const SUPPORTED_LANGS = ["en", "zh", "ja", "ko"];
    const DEFAULT_LANG = "en";

    // i18n dictionary — key-first. Add / edit a key in one place.
    // Each entry: { en, zh, ja, ko }.
    const I18N = {
      // Language switcher
      langEn: { en: "English", zh: "英文", ja: "英語", ko: "영어" },

      langKo: { en: "Korean", zh: "韓文", ja: "韓国語", ko: "한국어" },

      // Check-in date
      checkInDate: { en: "Check-in Date", zh: "入住日期", ja: "チェックイン日", ko: "체크인 날짜" },

      bookingName: { en: "Booking Name", zh: "訂房人姓名", ja: "予約者氏名", ko: "예약자 성함" },

      phone: { en: "Phone Number", zh: "聯繫電話", ja: "電話番号", ko: "연락처" },

      // LINE ID
      lineId: { en: "WhatsApp ID", zh: "LINE ID", ja: "LINE ID", ko: "Kakao ID" },
      lineIdPh: {
        en: "e.g. +1 555 123 4567",
        zh: "例如：hotel109_tw",
        ja: "例：hotel109_jp",
        ko: "예: hotel109_kr",
      },

      // Gender
      gender: { en: "Gender", zh: "性別", ja: "性別", ko: "성별" },
      male: { en: "Male", zh: "男", ja: "男性", ko: "남성" },
      female: { en: "Female", zh: "女", ja: "女性", ko: "여성" },

      // Source
      source: { en: "Source", zh: "來源", ja: "予約元", ko: "예약 경로" },
      srcAirbnb: { en: "Airbnb", zh: "Airbnb", ja: "Airbnb", ko: "Airbnb" },

    function t(key, lang) {
      const e = I18N[key];
      if (!e) return "";
      return e[lang] ?? e[DEFAULT_LANG] ?? "";
    }
    function dictFor(lang) {
      const out = {};
      for (const k in I18N) out[k] = t(k, lang);
      return out;
    }

    const STORAGE_KEY = "bookingFormDraft";
    const LANG_KEY = "bookingFormLang";
    const I18N_CACHE_KEY = "bookingFormI18N";

    const form = document.getElementById("booking-form");
    const langBtns = document.querySelectorAll(".lang-btn");

    function currentLang() {
      const saved = localStorage.getItem(LANG_KEY);
      return SUPPORTED_LANGS.includes(saved) ? saved : DEFAULT_LANG;
    }

    const FP_LOCALES = { en: null, zh: "zh_tw", ja: "ja", ko: "ko" };
    let fpInstance = null;

    // Per-language field rules (required / visibility)
    const FIELD_RULES = {
      phone: { required: { en: false, zh: true, ja: false, ko: false } },
    };

    function applyFieldRules(lang) {
      for (const name in FIELD_RULES) {
        const rule = FIELD_RULES[name];
        const input = form.elements[name];
        if (input && rule.required) {
          const req = !!rule.required[lang];
          input.required = req;
          const mark = document.querySelector('[data-required-for="' + name + '"]');
          if (mark) mark.style.display = req ? "" : "none";
        }
      }
    }

    function setupDatePicker(lang) {
      const dateInput = document.getElementById("checkInDate");
      if (!window.flatpickr || !dateInput) return;
      const prev = fpInstance ? fpInstance.input.value : dateInput.value;
      if (fpInstance) { fpInstance.destroy(); fpInstance = null; }
      const dict = dictFor(lang);
      const localeKey = FP_LOCALES[lang];
      const opts = {
        dateFormat: "Y-m-d",
        allowInput: false,
        disableMobile: true,
      };
      if (localeKey && flatpickr.l10ns && flatpickr.l10ns[localeKey]) {
        opts.locale = flatpickr.l10ns[localeKey];
      }
      fpInstance = flatpickr(dateInput, opts);
      dateInput.setAttribute("placeholder", dict.datePlaceholder || "YYYY-MM-DD");
      if (prev) fpInstance.setDate(prev, false);
    }

    function renderTerms(lang) {
      const box = document.getElementById("termsBox");
      if (!box) return;
      const list = TERMS[lang] || TERMS[DEFAULT_LANG] || [];
      box.innerHTML = "";
      list.forEach((item) => {
        const h = document.createElement("h4");
        h.textContent = item.title;
        box.appendChild(h);
        item.body.split("\n").forEach((line) => {
          const p = document.createElement("p");
          p.textContent = line;
          box.appendChild(p);
        });
      });
    }

    function applyLang(lang) {
      const dict = dictFor(lang);
      const htmlLang = lang === "zh" ? "zh-TW" : lang;
      document.documentElement.lang = htmlLang;

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[key] !== undefined) el.textContent = dict[key];
      });
      document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
        const key = el.getAttribute("data-i18n-ph");
        if (dict[key] !== undefined) el.setAttribute("placeholder", dict[key]);
      });

      renderTerms(lang);
      setupDatePicker(lang);
      applyFieldRules(lang);

      langBtns.forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.lang === lang);
      });
      document.title = dict.formTitle;
    }

    langBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        const lang = btn.dataset.lang;
        if (!SUPPORTED_LANGS.includes(lang)) return;
        localStorage.setItem(LANG_KEY, lang);
        applyLang(lang);
      });
    });

    function readDraft() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }
    function saveDraft(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    function clearDraft() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function collectFormData() {
      const data = {};
      Array.from(form.elements).forEach((el) => {
        if (!el.name) return;
        if (el.type === "file") return;
        if (el.type === "radio") {
          if (el.checked) data[el.name] = el.value;
        } else if (el.type === "checkbox") {
          data[el.name] = el.checked;
        } else {
          data[el.name] = el.value;
        }
      });
      return data;
    }

    function restoreDraft() {
      const draft = readDraft();
      Object.keys(draft).forEach((name) => {
        const value = draft[name];
        const fields = form.elements[name];
        if (!fields) return;
        if (fields instanceof RadioNodeList) {
          fields.forEach((el) => {
            if (el.type === "radio") el.checked = el.value === value;
          });
        } else if (fields.type === "file") {
          // file inputs can't be restored for security
        } else {
          fields.value = value;
        }
      });
    }

    form.addEventListener("input", () => saveDraft(collectFormData()));
    form.addEventListener("change", () => saveDraft(collectFormData()));

    const emailInput = document.getElementById("email");
    const emailError = document.getElementById("emailError");
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    function validateEmail() {
      const v = emailInput.value.trim();
      const invalid = v !== "" && !EMAIL_RE.test(v);
      emailInput.classList.toggle("is-invalid", invalid);
      emailError.classList.toggle("is-visible", invalid);
    }
    emailInput.addEventListener("input", validateEmail);
    emailInput.addEventListener("blur", validateEmail);

    const idFileInput = document.getElementById("idFile");
    const idFileName = document.getElementById("idFileName");
    let compressedFile = null;

    function updateFileName() {
      const dict = dictFor(currentLang());
      idFileName.classList.remove("is-busy");
      const f = compressedFile || (idFileInput.files && idFileInput.files[0]);
      if (f) {
        idFileName.removeAttribute("data-i18n");
        idFileName.textContent = f.name + " (" + (f.size / 1024 / 1024).toFixed(2) + "MB)";
      } else {
        idFileName.setAttribute("data-i18n", "noFileChosen");
        idFileName.textContent = dict.noFileChosen;
      }
    }

    idFileInput.addEventListener("change", async () => {
      compressedFile = null;
      updateFileName();
      const raw = idFileInput.files && idFileInput.files[0];
      if (!raw) return;
      if (raw.type.startsWith("image/") && raw.size > COMPRESS_TARGET) {
        const dict = dictFor(currentLang());
        idFileName.classList.add("is-busy");
        idFileName.textContent = dict.compressing;
        try {
          compressedFile = await compressImage(raw);
        } catch (err) {
          console.error(err);
        }
        updateFileName();
      }
    });

    const MAX_BYTES = 10 * 1024 * 1024;
    const COMPRESS_TARGET = 400 * 1024;

    async function decodeImage(file) {
      try {
        return await createImageBitmap(file);
      } catch (e) {
        const url = URL.createObjectURL(file);
        try {
          return await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = (err) => reject(err);
            img.src = url;
          });
        } finally {
          setTimeout(() => URL.revokeObjectURL(url), 0);
        }
      }
    }

    async function compressImage(file) {
      let bitmap;
      try {
        bitmap = await decodeImage(file);
      } catch (e) {
        console.warn("Cannot decode image, skipping compression:", e);
        return file;
      }
      const MAX_DIM = 1800;
      let baseW = bitmap.naturalWidth || bitmap.width;
      let baseH = bitmap.naturalHeight || bitmap.height;
      const maxSide = Math.max(baseW, baseH);
      if (maxSide > MAX_DIM) {
        const r = MAX_DIM / maxSide;
        baseW = Math.round(baseW * r);
        baseH = Math.round(baseH * r);
      }
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const scales = [1, 0.85, 0.7, 0.55, 0.45, 0.35, 0.28];
      const qualities = [0.85, 0.75, 0.65, 0.55, 0.45];
      let last = null;
      for (const scale of scales) {
        canvas.width = Math.max(1, Math.round(baseW * scale));
        canvas.height = Math.max(1, Math.round(baseH * scale));
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
        for (const quality of qualities) {
          const blob = await new Promise((res) =>
            canvas.toBlob(res, "image/jpeg", quality)
          );
          if (!blob) continue;
          last = blob;
          if (blob.size <= COMPRESS_TARGET) {
            const name = file.name.replace(/\.[^.]+$/, "") + ".jpg";
            return new File([blob], name, {
              type: "image/jpeg",
              lastModified: Date.now(),
            });
          }
        }
      }
      const name = file.name.replace(/\.[^.]+$/, "") + ".jpg";
      return new File([last || file], name, {
        type: "image/jpeg",
        lastModified: Date.now(),
      });
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    const sigCanvas = document.getElementById("signatureCanvas");
    const sigClearBtn = document.getElementById("signatureClear");
    const sigCtx = sigCanvas.getContext("2d");
    let sigDrawing = false;
    let sigHasInk = false;
    let sigLastX = 0;
    let sigLastY = 0;

    function resizeSignatureCanvas() {
      const rect = sigCanvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const prev = sigHasInk ? sigCanvas.toDataURL() : null;
      sigCanvas.width = Math.max(1, Math.round(rect.width * dpr));
      sigCanvas.height = Math.max(1, Math.round(rect.height * dpr));
      sigCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      sigCtx.lineWidth = 2;
      sigCtx.lineCap = "round";
      sigCtx.lineJoin = "round";
      sigCtx.strokeStyle = "#202124";
      if (prev) {
        const img = new Image();
        img.onload = () => sigCtx.drawImage(img, 0, 0, rect.width, rect.height);
        img.src = prev;
      }
    }

    function sigPoint(e) {
      const rect = sigCanvas.getBoundingClientRect();
      const t = e.touches && e.touches[0];
      const cx = t ? t.clientX : e.clientX;
      const cy = t ? t.clientY : e.clientY;
      return { x: cx - rect.left, y: cy - rect.top };
    }

    function sigStart(e) {
      e.preventDefault();
      sigDrawing = true;
      const p = sigPoint(e);
      sigLastX = p.x;
      sigLastY = p.y;
    }
    function sigMove(e) {
      if (!sigDrawing) return;
      e.preventDefault();
      const p = sigPoint(e);
      sigCtx.beginPath();
      sigCtx.moveTo(sigLastX, sigLastY);
      sigCtx.lineTo(p.x, p.y);
      sigCtx.stroke();
      sigLastX = p.x;
      sigLastY = p.y;
      sigHasInk = true;
    }
    function sigEnd(e) {
      if (!sigDrawing) return;
      if (e) e.preventDefault();
      sigDrawing = false;
    }

    sigCanvas.addEventListener("mousedown", sigStart);
    sigCanvas.addEventListener("mousemove", sigMove);
    window.addEventListener("mouseup", sigEnd);
    sigCanvas.addEventListener("touchstart", sigStart, { passive: false });
    sigCanvas.addEventListener("touchmove", sigMove, { passive: false });
    sigCanvas.addEventListener("touchend", sigEnd);
    sigCanvas.addEventListener("touchcancel", sigEnd);

    function clearSignature() {
      sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
      sigHasInk = false;
    }
    sigClearBtn.addEventListener("click", clearSignature);

    window.addEventListener("resize", resizeSignatureCanvas);
    resizeSignatureCanvas();

    async function sendToBackend(payload, file) {
      if (!ENDPOINT) {
        console.warn("ENDPOINT 未設定，以下是送出資料：", payload, file);
        await new Promise((r) => setTimeout(r, 300));
        return true;
      }
      const body = {
        ...payload,
        lang: currentLang(),
        submittedAt: new Date().toISOString(),
      };
      if (file) {
        body.fileBase64 = await fileToBase64(file);
        body.fileName = file.name;
        body.fileMimeType = file.type;
      }
      const res = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(body),
      });
      if (!res.ok) return false;
      try {
        const json = await res.json();
        return json.ok === true;
      } catch {
        return true;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const dict = dictFor(currentLang());

      if (!form.checkValidity()) {
        form.reportValidity();
        alert(dict.validateRequired);
        return;
      }

      if (!sigHasInk) {
        alert(dict.signatureRequired);
        return;
      }

      const btn = form.querySelector(".submit-btn");
      const overlay = document.getElementById("submitOverlay");
      btn.disabled = true;
      overlay.classList.add("is-active");

      const data = collectFormData();
      const lang = currentLang();
      if (data.gender) data.gender = t(data.gender, lang) || data.gender;
      if (data.nationality) {
        const key = data.nationality === "OTHER" ? "nationalityOther" : "nat" + data.nationality;
        data.nationality = t(key, lang) || data.nationality;
      }
      data.signatureBase64 = sigCanvas.toDataURL("image/png");
      const rawFile = idFileInput.files && idFileInput.files[0];
      let file = compressedFile || rawFile;

      try {
        if (file && file.size > MAX_BYTES) {
          alert(file.type.startsWith("image/") ? dict.idFileTooLarge : dict.pdfTooLarge);
          return;
        }

        const ok = await sendToBackend(data, file);
        if (!ok) throw new Error("send failed");
        clearDraft();
        form.reset();
        compressedFile = null;
        updateFileName();
        clearSignature();
        alert(dict.submitOk);
      } catch (err) {
        console.error(err);
        alert(dict.submitFail);
      } finally {
        btn.disabled = false;
        overlay.classList.remove("is-active");
      }
    });

    function mergeI18N(data) {
      for (const k in data) {
        const entry = data[k];
        if (I18N[k]) Object.assign(I18N[k], entry);
        else I18N[k] = entry;
      }
    }

    function loadCachedI18N() {
      try {
        const raw = localStorage.getItem(I18N_CACHE_KEY);
        if (!raw) return;
        mergeI18N(JSON.parse(raw));
      } catch {}
    }

    async function loadRemoteI18N() {
      if (!ENDPOINT) return;
      try {
        const res = await fetch(ENDPOINT);
        if (!res.ok) return;
        const json = await res.json();
        if (!json.ok || !json.data) return;
        mergeI18N(json.data);
        localStorage.setItem(I18N_CACHE_KEY, JSON.stringify(json.data));
        applyLang(currentLang());
      } catch (e) {
        console.warn("Failed to load remote i18n:", e);
      }
    }

    loadCachedI18N();
    applyLang(currentLang());
    restoreDraft();
    loadRemoteI18N();
  })();
  </script>
</body>
</html>
